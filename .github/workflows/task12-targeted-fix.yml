name: Task12 targeted fixes

on:
  push:
    branches:
      - task12-settings-columns-editing-ux
    paths:
      - .github/workflows/task12-targeted-fix.yml

permissions:
  contents: write

jobs:
  apply-fixes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: task12-settings-columns-editing-ux
          fetch-depth: 0

      - name: Apply targeted fixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          edit_path = Path('apps/board-web/src/components/EditRecordDrawer.tsx')
          edit_text = edit_path.read_text(encoding='utf-8')
          old_baseline = """  const baselineRecordRef = useRef<RecordItem<RecordBody> | null>(null)
          if (baselineRecordRef.current == null) {
            baselineRecordRef.current = record.body
          }
          const baselineRecord = baselineRecordRef.current
          """
          new_baseline = """  const [baselineRecord] = useState<RecordItem<RecordBody>>(() => record.body)
          """
          if edit_text.count(old_baseline) != 1:
            raise SystemExit('EditRecordDrawer baseline block did not match exactly once')
          edit_path.write_text(edit_text.replace(old_baseline, new_baseline), encoding='utf-8')

          detail_path = Path('apps/board-web/src/components/RecordDetailDrawer.tsx')
          detail_text = detail_path.read_text(encoding='utf-8')
          old_request_history = """  function requestHistory() {
            if (!editState.requestClose()) {
              setPendingAction({ type: 'history' })
              return
            }
            editState.setDraft(initialDraft())
            editState.setEditingSections([])
            onHistoryClick(activeRecord)
            setActivePanel('history')
          }
          """
          new_request_history = """  function requestHistory() {
            if (!editState.requestClose()) {
              setPendingAction({ type: 'history' })
              return
            }
            editState.setDraft(initialDraft())
            editState.setEditingSections([])
            onClose()
            onHistoryClick(activeRecord)
          }
          """
          if detail_text.count(old_request_history) != 1:
            raise SystemExit('RecordDetailDrawer requestHistory block did not match exactly once')
          detail_text = detail_text.replace(old_request_history, new_request_history)

          old_confirm_history = """    onHistoryClick(activeRecord)
            setActivePanel('history')
          }
          """
          new_confirm_history = """    onClose()
            onHistoryClick(activeRecord)
          }
          """
          if detail_text.count(old_confirm_history) != 1:
            raise SystemExit('RecordDetailDrawer confirm history block did not match exactly once')
          detail_path.write_text(
            detail_text.replace(old_confirm_history, new_confirm_history),
            encoding='utf-8',
          )
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/task12-targeted-fix.yml
          git add apps/board-web/src/components/EditRecordDrawer.tsx
          git add apps/board-web/src/components/RecordDetailDrawer.tsx
          git commit -m "fix(web): close task12 review blockers"
          git push origin HEAD:task12-settings-columns-editing-ux
