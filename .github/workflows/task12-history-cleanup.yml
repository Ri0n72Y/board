name: Task12 history cleanup

on:
  push:
    branches:
      - task12-settings-columns-editing-ux
    paths:
      - .github/workflows/task12-history-cleanup.yml

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: task12-settings-columns-editing-ux
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Remove unreachable inline history code
        run: |
          python - <<'PY'
          from pathlib import Path

          detail_path = Path('apps/board-web/src/components/RecordDetailDrawer.tsx')
          text = detail_path.read_text()

          replacements = [
              ("  RecordHistoryResponse,\n", ""),
              ("import {\n  ArrowLeftIcon,\n  ClockIcon,\n  PencilSquareIcon,\n} from '@heroicons/react/20/solid'", "import { ClockIcon, PencilSquareIcon } from '@heroicons/react/20/solid'"),
              ("import { RecordHistoryContent } from './RecordHistoryDrawer'\n", ""),
              ("import type { RecordReferenceOption } from '../utils/recordReferenceOptions'\n", ""),
              ("  history: RecordHistoryResponse | null\n  isHistoryLoading: boolean\n  historyError: string | null\n  assetOptions: RecordReferenceOption[]\n", ""),
              ("  history,\n  isHistoryLoading,\n  historyError,\n  assetOptions,\n", ""),
              ("  const [activePanel, setActivePanel] = useState<'detail' | 'history'>('detail')\n", ""),
              ("    setActivePanel('detail')\n", ""),
              ("        subtitle={\n          activePanel === 'history'\n            ? `${activeCurrent.pid} · ${t('history.subtitle')}`\n            : activeCurrent.pid\n        }", "        subtitle={activeCurrent.pid}"),
              ("          {activePanel === 'history' ? (\n            <RecordHistoryContent\n              history={history}\n              isLoading={isHistoryLoading}\n              error={historyError}\n              language={lang}\n              assetOptions={assetOptions}\n              profiles={profiles ?? null}\n            />\n          ) : (\n            <div", "          <div"),
              ("            </div>\n          )}\n        </div>", "            </div>\n        </div>"),
          ]

          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f'missing RecordDetailDrawer pattern: {old!r}')
              text = text.replace(old, new)

          old_footer = """  const footer = (\n    <div className=\"flex flex-wrap items-center justify-between gap-3\">\n      <div className=\"flex flex-wrap items-center gap-2\">\n        {activePanel === 'detail' ? (\n          <Button\n            type=\"button\"\n            variant=\"ghost\"\n            onClick={requestHistory}\n            icon={<ClockIcon className=\"h-4 w-4\" />}\n          >\n            {t('record.history')}\n          </Button>\n        ) : (\n          <Button\n            type=\"button\"\n            variant=\"ghost\"\n            onClick={() => setActivePanel('detail')}\n            icon={<ArrowLeftIcon className=\"h-4 w-4\" />}\n          >\n            {t('record.details')}\n          </Button>\n        )}\n        {activePanel === 'detail' && editState.dirty && (\n          <Button\n            type=\"button\"\n            onClick={() => void save()}\n            disabled={isSaving}\n            icon={<PencilSquareIcon className=\"h-4 w-4\" />}\n          >\n            {isSaving ? t('edit.saving') : t('edit.saveButton')}\n          </Button>\n        )}\n      </div>\n      <p className=\"text-xs text-slate-500\">\n        {t('record.created')}: {formatDate(activeRecord.createdAt)} ·{' '}\n        {t('record.updated')}: v{baseHead?.currentVersion ?? '—'}\n      </p>\n    </div>\n  )\n"""
          new_footer = """  const footer = (\n    <div className=\"flex flex-wrap items-center justify-between gap-3\">\n      <div className=\"flex flex-wrap items-center gap-2\">\n        <Button\n          type=\"button\"\n          variant=\"ghost\"\n          onClick={requestHistory}\n          icon={<ClockIcon className=\"h-4 w-4\" />}\n        >\n          {t('record.history')}\n        </Button>\n        {editState.dirty && (\n          <Button\n            type=\"button\"\n            onClick={() => void save()}\n            disabled={isSaving}\n            icon={<PencilSquareIcon className=\"h-4 w-4\" />}\n          >\n            {isSaving ? t('edit.saving') : t('edit.saveButton')}\n          </Button>\n        )}\n      </div>\n      <p className=\"text-xs text-slate-500\">\n        {t('record.created')}: {formatDate(activeRecord.createdAt)} ·{' '}\n        {t('record.updated')}: v{baseHead?.currentVersion ?? '—'}\n      </p>\n    </div>\n  )\n"""
          if old_footer not in text:
              raise SystemExit('missing RecordDetailDrawer footer pattern')
          text = text.replace(old_footer, new_footer)
          detail_path.write_text(text)

          page_path = Path('apps/board-web/src/pages/BoardCurrentPage.tsx')
          page = page_path.read_text()
          old_props = """        assetOptions={assetOptions}\n        history={historyController.history}\n        isHistoryLoading={historyController.isHistoryLoading}\n        historyError={historyController.historyError}\n"""
          if old_props not in page:
              raise SystemExit('missing BoardCurrentPage detail history props')
          page = page.replace(old_props, '')
          page_path.write_text(page)
          PY
      - name: Validate focused change
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @labour-board/web typecheck
          pnpm --filter @labour-board/web lint
          pnpm --filter @labour-board/web build
          git diff --check
      - name: Commit cleanup and remove workflow
        run: |
          rm .github/workflows/task12-history-cleanup.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/board-web/src/components/RecordDetailDrawer.tsx apps/board-web/src/pages/BoardCurrentPage.tsx .github/workflows/task12-history-cleanup.yml
          git commit -m "refactor: remove unreachable inline history panel"
          git push origin HEAD:task12-settings-columns-editing-ux
