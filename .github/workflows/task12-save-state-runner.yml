name: Task12 save state cleanup runner

on:
  push:
    branches:
      - task12-settings-columns-editing-ux

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: task12-settings-columns-editing-ux
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Execute existing migration script
        run: |
          python - <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/task12-save-state-and-hook-cleanup.yml').read_text()
          start_marker = "          python - <<'PY'\n"
          end_marker = "          PY\n      - name: Verify boundaries"
          start = source.index(start_marker) + len(start_marker)
          end = source.index(end_marker, start)
          script = '\n'.join(
              line[10:] if line.startswith('          ') else line
              for line in source[start:end].splitlines()
          )
          exec(compile(script, 'task12-save-state-cleanup.py', 'exec'))
          PY
      - name: Verify boundaries
        run: |
          ! grep -R "editingSections\|setEditingSections\|requestSection\|selectedSection\|setSelectedSection" apps/board-web/src --include='*.ts' --include='*.tsx'
          grep -q "closeDisabled={isSaving}" apps/board-web/src/components/RecordDetailDrawer.tsx
          grep -q "result.patch.body.id" apps/board-web/src/components/RecordDetailDrawer.tsx
          grep -q "sameRelationDrafts" apps/board-web/src/utils/editPatchDraft.ts
      - name: Validate
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @labour-board/web typecheck
          pnpm --filter @labour-board/web lint
          pnpm --filter @labour-board/web build
          git diff --check
      - name: Commit fixes and clean temporary files
        run: |
          rm .github/workflows/task12-save-state-and-hook-cleanup.yml
          rm .github/workflows/task12-save-state-runner.yml
          rm -f .github/task12-save-state-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: close record edit save state gaps"
          git push origin HEAD:task12-settings-columns-editing-ux
