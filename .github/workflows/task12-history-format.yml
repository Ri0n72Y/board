name: Task12 history formatting

on:
  push:
    branches:
      - task12-settings-columns-editing-ux
    paths:
      - .github/workflows/task12-history-format.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: task12-settings-columns-editing-ux
          fetch-depth: 0
      - name: Normalize cleanup indentation
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('apps/board-web/src/components/RecordDetailDrawer.tsx')
          text = path.read_text()
          replacements = [
              ("    if (!action || action.type === 'close') {\n        onClose()\n      return\n", "    if (!action || action.type === 'close') {\n      onClose()\n      return\n"),
              ("          <div\n              className=\"grid min-h-full content-start gap-4\"\n              onClick={deactivateActiveEditSection}\n            >", "          <div\n            className=\"grid min-h-full content-start gap-4\"\n            onClick={deactivateActiveEditSection}\n          >"),
              ("            </div>\n        </div>\n      </AnimatedDrawer>", "          </div>\n        </div>\n      </AnimatedDrawer>"),
          ]
          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f'missing formatting pattern: {old!r}')
              text = text.replace(old, new)
          path.write_text(text)
          PY
      - name: Validate focused change
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm --filter @labour-board/web typecheck
          pnpm --filter @labour-board/web lint
          pnpm --filter @labour-board/web build
          git diff --check
      - name: Commit formatting and remove workflow
        run: |
          rm .github/workflows/task12-history-format.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/board-web/src/components/RecordDetailDrawer.tsx .github/workflows/task12-history-format.yml
          git commit -m "style: normalize detail drawer cleanup"
          git push origin HEAD:task12-settings-columns-editing-ux
