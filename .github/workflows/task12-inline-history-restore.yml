name: Task12 inline history restore

on:
  push:
    branches:
      - task12-settings-columns-editing-ux
    paths:
      - .github/workflows/task12-inline-history-restore.yml

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: task12-settings-columns-editing-ux
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Restore detail history tab and remove standalone drawer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout 7077713887094cceff34df656b64479b5b20048b -- apps/board-web/src/components/RecordDetailDrawer.tsx
          git checkout 8a42d9bfefbb05fd4e7e01793b3fcb97692d791a -- apps/board-web/src/pages/BoardCurrentPage.tsx

          python - <<'PY'
          from pathlib import Path
          import re

          page_path = Path('apps/board-web/src/pages/BoardCurrentPage.tsx')
          page = page_path.read_text()
          page = page.replace(
              "import { RecordHistoryDrawer } from '../components/RecordHistoryDrawer'\n",
              '',
          )
          drawer_block = re.compile(
              r"\n\s*<RecordHistoryDrawer\n"
              r".*?"
              r"\n\s*/>\n",
              re.S,
          )
          page, count = drawer_block.subn('\n', page, count=1)
          if count != 1:
              raise SystemExit(f'expected one standalone RecordHistoryDrawer block, found {count}')
          page_path.write_text(page)

          old_history_path = Path('apps/board-web/src/components/RecordHistoryDrawer.tsx')
          history_text = old_history_path.read_text()
          marker = 'export function RecordHistoryContent'
          marker_index = history_text.find(marker)
          if marker_index < 0:
              raise SystemExit('RecordHistoryContent marker missing')

          content_body = history_text[marker_index:]
          content_imports = """import type { Profile, RecordHistoryResponse } from '@labour-board/shared'\nimport { ExclamationTriangleIcon } from '@heroicons/react/20/solid'\nimport { useMemo } from 'react'\nimport { useTranslation } from 'react-i18next'\nimport { Badge } from './ui/Badge'\nimport {\n  buildPatchTimeline,\n  debugInitiallyOpen,\n  type HistorySummaryCopy,\n} from '../utils/historySummary'\nimport type { RecordReferenceOption } from '../utils/recordReferenceOptions'\n\n"""
          new_history_path = Path('apps/board-web/src/components/RecordHistoryContent.tsx')
          new_history_path.write_text(content_imports + content_body)
          old_history_path.unlink()

          detail_path = Path('apps/board-web/src/components/RecordDetailDrawer.tsx')
          detail = detail_path.read_text()
          old_import = "import { RecordHistoryContent } from './RecordHistoryDrawer'"
          new_import = "import { RecordHistoryContent } from './RecordHistoryContent'"
          if old_import not in detail:
              raise SystemExit('RecordDetailDrawer history content import missing')
          detail = detail.replace(old_import, new_import)
          detail_path.write_text(detail)
          PY
      - name: Validate restored structure
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @labour-board/web typecheck
          pnpm --filter @labour-board/web lint
          pnpm --filter @labour-board/web build
          git diff --check
          test ! -e apps/board-web/src/components/RecordHistoryDrawer.tsx
          test -e apps/board-web/src/components/RecordHistoryContent.tsx
          ! grep -R "<RecordHistoryDrawer" apps/board-web/src
          grep -q "setActivePanel('history')" apps/board-web/src/components/RecordDetailDrawer.tsx
          grep -q "history={historyController.history}" apps/board-web/src/pages/BoardCurrentPage.tsx
      - name: Commit restored structure and remove workflow
        run: |
          rm .github/workflows/task12-inline-history-restore.yml
          git add apps/board-web/src/components/RecordDetailDrawer.tsx apps/board-web/src/components/RecordHistoryContent.tsx apps/board-web/src/components/RecordHistoryDrawer.tsx apps/board-web/src/pages/BoardCurrentPage.tsx .github/workflows/task12-inline-history-restore.yml
          git commit -m "fix: restore history tab inside detail drawer"
          git push origin HEAD:task12-settings-columns-editing-ux
