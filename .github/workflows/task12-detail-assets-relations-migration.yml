name: Task12 detail assets relations migration

on:
  push:
    branches:
      - task12-settings-columns-editing-ux
    paths:
      - .github/workflows/task12-detail-assets-relations-migration.yml

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: task12-settings-columns-editing-ux
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Migrate assets and relations editing into detail drawer
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              return text.replace(old, new, 1)

          detail_path = Path('apps/board-web/src/components/RecordDetailDrawer.tsx')
          detail = detail_path.read_text()

          detail = replace_once(
              detail,
              "  useState,\n  type MutableRefObject,\n  type ReactNode,\n} from 'react'",
              "  useState,\n  type MutableRefObject,\n} from 'react'",
              'remove ReactNode import',
          )
          detail = replace_once(
              detail,
              "  RecordItem,\n  RecordResponse,\n  Tag,",
              "  RecordItem,\n  RecordResponse,\n  RelationRef,\n  Tag,",
              'RelationRef import',
          )
          detail = replace_once(
              detail,
              "import type { RecordReferenceOption } from '../utils/recordReferenceOptions'",
              "import {\n  ensureReferenceOptions,\n  type RecordReferenceOption,\n} from '../utils/recordReferenceOptions'\nimport type { RelationConstraintOption } from '../utils/relationDisplay'\nimport { RelationEditor } from './RelationEditor'",
              'reference and relation imports',
          )
          detail = replace_once(
              detail,
              "type DetailEditSection = 'title' | 'summary' | 'details' | 'assignee' | 'tags'",
              "type DetailEditSection =\n  | 'title'\n  | 'summary'\n  | 'details'\n  | 'assignee'\n  | 'tags'\n  | 'assets'\n  | 'relations'",
              'detail section union',
          )
          detail = replace_once(
              detail,
              "  assignee: string\n  tags: Tag[]\n}",
              "  assignee: string\n  tags: Tag[]\n  assets: string[]\n  relations: RelationRef[]\n}",
              'display record references',
          )
          detail = replace_once(
              detail,
              "  assetOptions: RecordReferenceOption[]\n  initialPatchDescription?: string",
              "  assetOptions: RecordReferenceOption[]\n  relationTargetOptions: RecordReferenceOption[]\n  relationConstraintOptions: RelationConstraintOption[]\n  initialPatchDescription?: string",
              'detail relation props',
          )
          detail = replace_once(
              detail,
              "  historyError,\n  assetOptions,\n  initialPatchDescription,",
              "  historyError,\n  assetOptions,\n  relationTargetOptions,\n  relationConstraintOptions,\n  initialPatchDescription,",
              'detail relation prop destructuring',
          )
          detail = replace_once(
              detail,
              "      assignee: current.assignee ?? '',\n      tags: [...current.tags],",
              "      assignee: current.assignee ?? '',\n      tags: [...current.tags],\n      assets: [...(current.assets ?? [])],\n      relations: (current.relations ?? []).map((relation) => ({ ...relation })),",
              'display current references',
          )
          detail = replace_once(
              detail,
              "  const displayAssignee = displayRecord.assignee\n  const displayTags = displayRecord.tags",
              "  const displayAssignee = displayRecord.assignee\n  const displayTags = displayRecord.tags\n  const displayAssets = displayRecord.assets\n  const displayRelations = displayRecord.relations",
              'display reference variables',
          )
          detail = replace_once(
              detail,
              "  const draftAssigneeDisplay = formatProfileCompact(\n    draftAssignee,\n    draftAssigneeProfile,\n    t('record.unassigned'),\n    t('record.unknownMember')\n  )\n  const fieldDirty = buildEditFieldDirtyState(editState.draft, activeBaseline)",
              "  const draftAssigneeDisplay = formatProfileCompact(\n    draftAssignee,\n    draftAssigneeProfile,\n    t('record.unassigned'),\n    t('record.unknownMember')\n  )\n  const recordReferenceCopy = {\n    unknownAsset: t('recordReference.unknownAsset'),\n    unknownRecord: t('recordReference.unknownRecord'),\n    rawId: t('recordReference.rawId'),\n  }\n  const selectableAssetOptions = ensureReferenceOptions(\n    assetOptions,\n    editState.draft.assets,\n    'asset',\n    recordReferenceCopy\n  )\n  const selectableRelationTargetOptions = ensureReferenceOptions(\n    relationTargetOptions,\n    editState.draft.relations.map((relation) => relation.target),\n    'record',\n    recordReferenceCopy\n  )\n  const fieldDirty = buildEditFieldDirtyState(editState.draft, activeBaseline)",
              'selectable reference options',
          )
          detail = replace_once(
              detail,
              "    tags:\n      fieldDirty.statusTag ||\n      fieldDirty.priorityTag ||\n      fieldDirty.otherTags,\n  }",
              "    tags:\n      fieldDirty.statusTag ||\n      fieldDirty.priorityTag ||\n      fieldDirty.otherTags,\n    assets: fieldDirty.assets,\n    relations: fieldDirty.relations,\n  }\n  const visibleAssets = sectionDirty.assets\n    ? editState.draft.assets\n    : displayAssets\n  const visibleRelations = sectionDirty.relations\n    ? editState.draft.relations\n    : displayRelations",
              'reference dirty state',
          )
          detail = replace_once(
              detail,
              "        assignee: draftAssignee,\n        tags: draftTags,\n      })",
              "        assignee: draftAssignee,\n        tags: draftTags,\n        assets: [...savedDraft.assets],\n        relations: savedDraft.relations.map((relation) => ({ ...relation })),\n      })",
              'saved reference baseline',
          )

          old_read_only = '''              {(activeCurrent.assets?.length ?? 0) > 0 && (\n                <ReadOnlyInfoSection title={t('record.assets')}>\n                  <ul className="grid gap-1">\n                    {activeCurrent.assets?.map((asset) => (\n                      <li\n                        key={asset}\n                        className="truncate font-mono text-xs text-slate-700"\n                        title={asset}\n                      >\n                        {asset}\n                      </li>\n                    ))}\n                  </ul>\n                </ReadOnlyInfoSection>\n              )}\n\n              {(activeCurrent.relations?.length ?? 0) > 0 && (\n                <ReadOnlyInfoSection title={t('record.relations')}>\n                  <ul className="grid gap-1">\n                    {activeCurrent.relations?.map((rel, index) => (\n                      <li\n                        key={`${rel.constraint}:${rel.target}:${index}`}\n                        className="truncate text-xs text-slate-700"\n                        title={rel.target}\n                      >\n                        {rel.constraint}: {rel.target}\n                      </li>\n                    ))}\n                  </ul>\n                </ReadOnlyInfoSection>\n              )}'''
          new_editable = '''              <EditableSection\n                title={t('record.assets')}\n                editing={editState.isEditing('assets')}\n                dirty={sectionDirty.assets}\n                disabled={isSaving}\n                onEdit={() => beginEdit('assets')}\n                editor={\n                  <SearchSelect\n                    mode="option"\n                    label={t('edit.assetSelector')}\n                    options={selectableAssetOptions}\n                    values={editState.draft.assets}\n                    multiple\n                    onChangeMany={(assets) =>\n                      editState.setDraft((draft) => ({ ...draft, assets }))\n                    }\n                    placeholder={t('searchSelect.searchPlaceholder')}\n                    selectedLabel={t('edit.assets')}\n                    emptyText={t('filters.noAssetOptions')}\n                    allowCustomValue={false}\n                    disabled={isSaving}\n                  />\n                }\n              >\n                {visibleAssets.length > 0 ? (\n                  <ul className="grid gap-1">\n                    {visibleAssets.map((asset) => (\n                      <li\n                        key={asset}\n                        className="truncate font-mono text-xs text-slate-700"\n                        title={asset}\n                      >\n                        {asset}\n                      </li>\n                    ))}\n                  </ul>\n                ) : (\n                  <p className="text-sm text-slate-500">—</p>\n                )}\n              </EditableSection>\n\n              <EditableSection\n                title={t('record.relations')}\n                editing={editState.isEditing('relations')}\n                dirty={sectionDirty.relations}\n                disabled={isSaving}\n                onEdit={() => beginEdit('relations')}\n                editor={\n                  <RelationEditor\n                    label={t('relations.title')}\n                    value={editState.draft.relations}\n                    targetOptions={selectableRelationTargetOptions}\n                    constraintOptions={relationConstraintOptions}\n                    currentRecordId={activeCurrent.id}\n                    onChange={(relations) =>\n                      editState.setDraft((draft) => ({ ...draft, relations }))\n                    }\n                    disabled={isSaving}\n                  />\n                }\n              >\n                {visibleRelations.length > 0 ? (\n                  <ul className="grid gap-1">\n                    {visibleRelations.map((relation, index) => (\n                      <li\n                        key={`${relation.constraint}:${relation.target}:${index}`}\n                        className="truncate text-xs text-slate-700"\n                        title={relation.target}\n                      >\n                        {relation.constraint}: {relation.target}\n                      </li>\n                    ))}\n                  </ul>\n                ) : (\n                  <p className="text-sm text-slate-500">—</p>\n                )}\n              </EditableSection>'''
          detail = replace_once(detail, old_read_only, new_editable, 'editable reference sections')

          detail = replace_once(
              detail,
              '''function ReadOnlyInfoSection({\n  title,\n  children,\n}: {\n  title: string\n  children: ReactNode\n}) {\n  return (\n    <section className="rounded-lg border border-slate-200 bg-slate-50 p-4">\n      <h3 className="mb-2 text-xs font-bold uppercase text-slate-500">\n        {title}\n      </h3>\n      {children}\n    </section>\n  )\n}\n\n''',
              '',
              'remove read only helper',
          )
          detail = replace_once(
              detail,
              "    assignee: '',\n    tags: [],\n  }",
              "    assignee: '',\n    tags: [],\n    assets: [],\n    relations: [],\n  }",
              'empty display references',
          )
          detail = replace_once(
              detail,
              "    assignee: displayRecord.assignee || undefined,\n    tags: [...displayRecord.tags],\n    body:",
              "    assignee: displayRecord.assignee || undefined,\n    tags: [...displayRecord.tags],\n    assets: [...displayRecord.assets],\n    relations: displayRecord.relations.map((relation) => ({ ...relation })),\n    body:",
              'baseline display references',
          )
          detail_path.write_text(detail)

          page_path = Path('apps/board-web/src/pages/BoardCurrentPage.tsx')
          page = page_path.read_text()
          page = replace_once(
              page,
              "        profiles={profiles}\n        assetOptions={assetOptions}\n        history={historyController.history}",
              "        profiles={profiles}\n        assetOptions={assetOptions}\n        relationTargetOptions={relationTargetOptions}\n        relationConstraintOptions={relationConstraintOptions}\n        history={historyController.history}",
              'detail reference props',
          )
          page_path.write_text(page)
          PY
      - name: Verify migrated capability
        run: |
          grep -q "| 'assets'" apps/board-web/src/components/RecordDetailDrawer.tsx
          grep -q "| 'relations'" apps/board-web/src/components/RecordDetailDrawer.tsx
          grep -q "<RelationEditor" apps/board-web/src/components/RecordDetailDrawer.tsx
          grep -q "selectableAssetOptions" apps/board-web/src/components/RecordDetailDrawer.tsx
          grep -q "relationConstraintOptions={relationConstraintOptions}" apps/board-web/src/pages/BoardCurrentPage.tsx
          test ! -e apps/board-web/src/components/EditRecordDrawer.tsx
      - name: Validate
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @labour-board/web typecheck
          pnpm --filter @labour-board/web lint
          pnpm --filter @labour-board/web build
          git diff --check
      - name: Commit migration and remove workflow
        run: |
          rm .github/workflows/task12-detail-assets-relations-migration.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: migrate assets and relations editing into detail"
          git push origin HEAD:task12-settings-columns-editing-ux
