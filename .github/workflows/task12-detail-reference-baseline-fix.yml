name: Task12 detail reference baseline fix

on:
  push:
    branches:
      - task12-settings-columns-editing-ux
    paths:
      - .github/workflows/task12-detail-reference-baseline-fix.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: task12-settings-columns-editing-ux
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Use submitted reference state as local baseline
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('apps/board-web/src/components/RecordDetailDrawer.tsx')
          text = path.read_text()
          old = """        assets: [...savedDraft.assets],\n        relations: savedDraft.relations.map((relation) => ({ ...relation })),"""
          new = """        assets: [\n          ...(validation.patch.assets ?? activeBaseline.assets ?? []),\n        ],\n        relations: (\n          validation.patch.relations ??\n          activeBaseline.relations ??\n          []\n        ).map((relation) => ({ ...relation })),"""
          if text.count(old) != 1:
              raise SystemExit(f'expected one saved reference baseline, found {text.count(old)}')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Validate
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @labour-board/web typecheck
          pnpm --filter @labour-board/web lint
          pnpm --filter @labour-board/web build
          git diff --check
      - name: Commit fix and remove workflow
        run: |
          rm .github/workflows/task12-detail-reference-baseline-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: align detail reference baseline with submitted patch"
          git push origin HEAD:task12-settings-columns-editing-ux
