name: Task12 uncategorized edit fix

on:
  push:
    branches:
      - task12-settings-columns-editing-ux
    paths:
      - .github/workflows/task12-uncategorized-edit-fix.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: task12-settings-columns-editing-ux
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Preserve uncategorized status during edits
        run: |
          python - <<'PY'
          from pathlib import Path

          drawer = Path('apps/board-web/src/components/EditRecordDrawer.tsx')
          text = drawer.read_text()
          replacements = [
              ("    initialFormState(\n      baselineRecord,\n      configOtherTags ?? knownTags,\n      statusTags\n    )", "    initialFormState(baselineRecord, configOtherTags ?? knownTags)"),
              ("function initialFormState(\n  record: RecordItem<RecordBody>,\n  knownTags: Tag[],\n  statusTags: Tag[]\n): EditPatchFormState {", "function initialFormState(\n  record: RecordItem<RecordBody>,\n  knownTags: Tag[]\n): EditPatchFormState {"),
              ("  const statusTag =\n    record.tags.find((tag) => tag.startsWith('status:')) ?? statusTags[0] ?? ''", "  const statusTag =\n    record.tags.find((tag) => tag.startsWith('status:')) ?? ''"),
          ]
          for old, new in replacements:
              if old not in text:
                  raise SystemExit(f'missing EditRecordDrawer pattern: {old!r}')
              text = text.replace(old, new)
          drawer.write_text(text)

          draft = Path('apps/board-web/src/utils/editPatchDraft.ts')
          text = draft.read_text()
          old = "  if (!title) return { ok: false, error: 'edit.errorTitleRequired' }\n  if (!statusTag) return { ok: false, error: 'edit.errorStatusTagRequired' }\n\n  const patch: EditPatchDraft = {}"
          new = "  if (!title) return { ok: false, error: 'edit.errorTitleRequired' }\n\n  const currentStatusTag =\n    current.tags.find((tag) => tag.startsWith('status:')) ?? ''\n  if (!statusTag && currentStatusTag) {\n    return { ok: false, error: 'edit.errorStatusTagRequired' }\n  }\n\n  const patch: EditPatchDraft = {}"
          if old not in text:
              raise SystemExit('missing editPatchDraft status validation pattern')
          text = text.replace(old, new)
          draft.write_text(text)
          PY
      - name: Validate fix
        run: |
          pnpm install --frozen-lockfile
          pnpm --filter @labour-board/web typecheck
          pnpm --filter @labour-board/web lint
          pnpm --filter @labour-board/web build
          git diff --check
      - name: Commit fix and remove workflow
        run: |
          rm .github/workflows/task12-uncategorized-edit-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/board-web/src/components/EditRecordDrawer.tsx apps/board-web/src/utils/editPatchDraft.ts .github/workflows/task12-uncategorized-edit-fix.yml
          git commit -m "fix: preserve uncategorized status during edits"
          git push origin HEAD:task12-settings-columns-editing-ux
